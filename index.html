          "acceptedAnswer": { "@type": "Answer", "text": "Vector files (SVG, AI, EPS, PDF) are ideal because we can resize without quality loss. High-resolution PNGs (300dpi, transparent background) work well too. If all you have is a JPG or a screenshot, we can usually recreate it for a small one-time fee." }
        },
